---
- hosts: all
  become: yes

  vars:
    deploy_dir: "/deploy"
    app_dir: "/srv/gs-rest-service"
    jar_name: "rest-service-latest.jar"

    # Local jar (from your CI build machine)
    local_jar_path: "../../target/devops-demo-0.3.0.jar"

    tools_dir: "/opt/tools"

  tasks:

    - name: Create tools directory
      file:
        path: "{{ tools_dir }}"
        state: directory
        mode: '0755'

    - name: Install required system packages
      apt:
        name:
          - python3-pip
          - python3-lxml
          - openjdk-17-jre
        state: present
        update_cache: yes

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Create deploy directory
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    - name: Remove old jar if exists
      file:
        path: "{{ deploy_dir }}/{{ jar_name }}"
        state: absent
      ignore_errors: true

    - name: Stop running application if any
      shell: pkill -f devops-demo || true
      ignore_errors: true

    # ✅ FIXED: No Nexus (avoids DNS/network failure)
    - name: Copy jar to remote server
      copy:
        src: "{{ local_jar_path }}"
        dest: "{{ deploy_dir }}/{{ jar_name }}"
        mode: '0755'

    - name: Start application
      shell: |
        nohup java -jar {{ deploy_dir }}/{{ jar_name }} > app.log 2>&1 &
      async: 10
      poll: 0
